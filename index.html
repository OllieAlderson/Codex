<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODEX — Media Archival System</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#11222C;--surface:#1C5858;--surface2:#163D3D;
  --steel:rgba(83,177,177,0.22);--cyan:#53B1B1;
  --accent:#F69000;--a2:#D47A00;--bay:#F6C624;
  --muted:#7AACB8;--text:#F8FAFC;--text2:#A8C4CC;
  --danger:#EF4444;--success:#10B981;--r:2px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(83,177,177,0.35);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--cyan);}
#sidebar{width:220px;flex-shrink:0;background:rgba(17,34,44,0.96);backdrop-filter:blur(16px);border-right:1px solid rgba(83,177,177,0.18);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100%;z-index:100;}
#main{margin-left:220px;min-height:100vh;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;color:var(--text2);font-size:0.78rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;border-left:2px solid transparent;transition:all 0.3s ease-in-out;}
.nav-item:hover{color:var(--text);background:rgba(83,177,177,0.1);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(246,144,0,0.14);}
.media-card{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid rgba(83,177,177,0.22);transition:transform 0.3s ease-in-out,box-shadow 0.3s ease-in-out;}
.media-card:hover{transform:scale(1.03);box-shadow:0 0 30px rgba(246,144,0,0.35),0 0 60px rgba(246,144,0,0.12);}
.media-card.selected{border:2px solid var(--accent);box-shadow:0 0 0 2px var(--accent);}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(17,34,44,0.98) 0%,rgba(17,34,44,0.5) 45%,transparent 100%);}
.card-body{position:absolute;bottom:0;left:0;right:0;padding:12px;}
.stat-box{background:var(--surface);border:1px solid rgba(83,177,177,0.22);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border:none;font-family:'Barlow',sans-serif;transition:all 0.3s ease-in-out;}
.btn-o{background:var(--accent);color:#fff;}
.btn-o:hover{background:var(--a2);box-shadow:0 0 20px rgba(246,144,0,0.5);}
.btn-g{background:transparent;border:1px solid rgba(83,177,177,0.3);color:var(--text2);}
.btn-g:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-d{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--danger);}
.btn-d:hover{background:rgba(239,68,68,0.2);}
.btn-sm{padding:5px 10px;font-size:0.68rem;}
.btn-xs{padding:3px 8px;font-size:0.62rem;}
.inp{background:rgba(17,34,44,0.6);border:1px solid rgba(83,177,177,0.25);border-radius:var(--r);color:var(--text);padding:8px 11px;font-size:0.8rem;font-family:'Barlow',sans-serif;width:100%;transition:border-color 0.3s ease-in-out;outline:none;}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(83,177,177,0.15);}
select.inp option{background:var(--surface);}
textarea.inp{resize:vertical;min-height:64px;}
.lbl{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px;}
.modal-bg{position:fixed;inset:0;background:rgba(10,20,28,0.88);backdrop-filter:blur(12px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:rgba(17,34,44,0.97);border:1px solid rgba(83,177,177,0.3);border-radius:var(--r);backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(83,177,177,0.12),0 30px 60px rgba(0,0,0,0.6);width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding:26px;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:2px;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
.bf{background:rgba(99,102,241,0.25);color:#A5B4FC;border:1px solid rgba(99,102,241,0.4);}
.bs{background:rgba(16,185,129,0.22);color:#6EE7B7;border:1px solid rgba(16,185,129,0.35);}
.ba{background:rgba(236,72,153,0.22);color:#F9A8D4;border:1px solid rgba(236,72,153,0.35);}
.bw{background:rgba(246,144,0,0.15);color:var(--accent);border:1px solid rgba(246,144,0,0.35);}
.pips{display:flex;gap:3px;}
.pip{width:7px;height:7px;border-radius:50%;background:rgba(83,177,177,0.3);}
.pip.on{background:var(--accent);}
.prog-bar{height:3px;background:rgba(83,177,177,0.2);border-radius:1px;overflow:hidden;}
.prog-fill{height:100%;border-radius:1px;transition:width 0.5s;}
#toast{position:fixed;bottom:18px;right:18px;z-index:9999;transition:all 0.3s;transform:translateY(70px);opacity:0;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
.toast-inner{background:var(--surface);border:1px solid var(--accent);border-radius:var(--r);padding:10px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 0 28px rgba(246,144,0,0.28);font-size:0.8rem;font-weight:600;}
#cinema-view{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;}
#cinema-view.open{display:block;}
#director-view{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;}
#director-view.open{display:block;animation:overlayIn 0.3s ease-in-out;}
#actor-view{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;}
#actor-view.open{display:block;animation:overlayIn 0.3s ease-in-out;}
#cinema-view.open{display:block;animation:overlayIn 0.3s ease-in-out;}
#diary-view{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;}
#diary-view.open{display:block;animation:overlayIn 0.3s ease-in-out;}
#wrapped-view{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.88);overflow-y:auto;align-items:center;justify-content:center;}
#wrapped-view.open{display:flex;animation:overlayIn 0.3s ease-in-out;}
@keyframes overlayIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.glass-box{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid rgba(83,177,177,0.35);flex-shrink:0;}
.h-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;}
.h-scroll::-webkit-scrollbar{height:3px;}
.stab{padding:5px 13px;border-radius:var(--r);cursor:pointer;font-size:0.7rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text2);background:transparent;border:1px solid transparent;transition:all 0.3s ease-in-out;}
.stab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.stab:hover:not(.active){border-color:rgba(83,177,177,0.4);color:var(--text);}
.dc{color:#F43F5E;}.dw{color:#F6C624;}.do{color:#10B981;}
.poster-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
@media(max-width:1200px){.poster-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:900px){.poster-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){#sidebar{transform:translateX(-100%);}#main{margin-left:0;}.poster-grid{grid-template-columns:repeat(2,1fr);}}
.poster-card{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid rgba(83,177,177,0.22);transition:transform 0.3s ease-in-out,box-shadow 0.3s ease-in-out;aspect-ratio:2/3;}
.poster-card:hover{transform:scale(1.03);box-shadow:0 0 30px rgba(246,144,0,0.4),0 0 2px rgba(83,177,177,0.6);}
.poster-card.selected{border:2px solid var(--accent);}
.wl-card{flex-shrink:0;width:136px;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid rgba(83,177,177,0.22);transition:transform 0.3s ease-in-out,box-shadow 0.3s ease-in-out;aspect-ratio:2/3;position:relative;}
.wl-card:hover{transform:scale(1.04);box-shadow:0 0 28px rgba(246,144,0,0.35);}
.review-box{background:rgba(17,34,44,0.6);border:1px solid rgba(83,177,177,0.22);border-radius:var(--r);padding:14px;backdrop-filter:blur(8px);}
.settings-block{background:var(--surface);border:1px solid rgba(83,177,177,0.22);border-radius:var(--r);padding:18px;margin-bottom:10px;}
.chart-wrap{background:var(--surface);border:1px solid rgba(83,177,177,0.22);border-radius:var(--r);padding:18px;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);}
.disparity-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2.8rem;line-height:1;color:var(--accent);text-shadow:0 0 20px rgba(246,144,0,0.55);}
.batch-bar{background:rgba(246,144,0,0.07);border:1px solid rgba(246,144,0,0.28);border-radius:var(--r);padding:9px 13px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.28s ease forwards;}
</style>

<!-- ═══ MOBILE MODE STYLES ═══
     All rules keyed to body.mx — applied by JS when viewport ≤768px
     OR when the force-toggle is on. Desktop layout is completely untouched.
-->
<style>
/* ── Structural shells (always in DOM, hidden on desktop) ── */
#mobile-topbar{
  display:none;position:fixed;top:0;left:0;right:0;z-index:150;height:48px;
  background:rgba(17,34,44,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(83,177,177,0.2);
  align-items:center;padding:0 14px;justify-content:space-between;
}
#bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;height:62px;
  background:rgba(17,34,44,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(83,177,177,0.2);
  align-items:stretch;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
/* Bottom nav items */
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;color:var(--muted);font-size:0.5rem;font-weight:700;
  letter-spacing:0.07em;text-transform:uppercase;background:transparent;border:none;
  min-height:44px;min-width:44px;padding:4px 2px;transition:color 0.2s ease-in-out;
}
.bnav-item.active,.bnav-item:hover{color:var(--accent);}
/* Central "+" add button */
.bnav-add{
  align-self:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:1.35rem;font-weight:300;cursor:pointer;border:none;
  box-shadow:0 0 20px rgba(246,144,0,0.45);transition:background 0.2s,box-shadow 0.2s;
  min-height:44px;min-width:44px;
}
.bnav-add:hover{background:var(--a2);box-shadow:0 0 28px rgba(246,144,0,0.65);}

/* ── ACTIVE MOBILE LAYOUT — everything keyed to body.mx ── */
body.mx #mobile-topbar{display:flex;}
body.mx #bottom-nav{display:flex;}
body.mx #sidebar{transform:translateX(-100%);}
body.mx #main{margin-left:0 !important;padding-top:48px;padding-bottom:70px;}
body.mx #vc{padding:14px !important;}

/* Touch targets — 44px minimum per WCAG */
body.mx .btn{min-height:44px;}
body.mx .btn-sm{min-height:36px;padding:5px 10px;}
body.mx .stab{min-height:36px;}
body.mx input[type="text"],body.mx input[type="number"],body.mx input[type="password"],body.mx select,body.mx textarea{min-height:44px;}

/* Poster/media grids → 2 column */
body.mx .poster-grid{grid-template-columns:repeat(2,1fr) !important;}

/* Modal → full-width sheet */
body.mx .modal-bg{padding:8px !important;align-items:flex-end !important;}
body.mx .modal-box{max-width:100% !important;padding:16px !important;border-radius:var(--r) var(--r) 0 0 !important;max-height:88vh !important;}

/* Toast → clears the bottom nav */
body.mx #toast{bottom:74px !important;right:10px !important;}

/* Breadcrumb text in overlay headers — hide to keep header tight */
body.mx #cinema-inner>div:first-child>span,
body.mx #director-inner>div:first-child>span,
body.mx #actor-inner>div:first-child>span{display:none !important;}

/* ── CINEMA VIEW: image → full width at top, content below ── */
body.mx #cinema-inner>div:nth-child(2){
  display:flex !important;flex-direction:column !important;min-height:unset !important;
}
body.mx #cinema-inner>div:nth-child(2)>div:first-child{
  position:relative !important;top:auto !important;
  width:100% !important;height:52vw !important;
  max-height:360px !important;min-height:200px;
}
body.mx #cinema-inner>div:nth-child(2)>div:last-child{
  padding:22px 14px 80px !important;
}
/* Cinema dual-reviews → stack */
body.mx #cinema-inner [style*="grid-template-columns:1fr 1fr"]{
  grid-template-columns:1fr !important;
}
/* Cinema CLASH+ratings row: shrink on mobile but keep 3-col (already compact) */
body.mx #cinema-inner [style*="auto 1fr 1fr"]{gap:6px !important;}

/* ── DIRECTOR / ACTOR SPOTLIGHT: portrait top, content below ── */
body.mx #director-inner>div:nth-child(2),
body.mx #actor-inner>div:nth-child(2){
  display:flex !important;flex-direction:column !important;min-height:unset !important;
}
body.mx #director-inner>div:nth-child(2)>div:first-child,
body.mx #actor-inner>div:nth-child(2)>div:first-child{
  position:relative !important;top:auto !important;
  width:100% !important;height:52vw !important;max-height:340px !important;
}
body.mx #director-inner>div:nth-child(2)>div:last-child,
body.mx #actor-inner>div:nth-child(2)>div:last-child{
  padding:22px 14px 80px !important;
}
/* Spotlight stat grids: 4-col → 2-col */
body.mx #director-inner [style*="repeat(4,1fr)"],
body.mx #actor-inner [style*="repeat(4,1fr)"]{grid-template-columns:repeat(2,1fr) !important;}

/* ── NEXUS: compact grid adjustments via attribute selectors ── */
body.mx [style*="repeat(8,1fr)"]{grid-template-columns:repeat(4,1fr) !important;}
body.mx #vc [style*="repeat(4,1fr)"]{grid-template-columns:repeat(2,1fr) !important;}
body.mx #vc [style*="repeat(6,1fr)"]{grid-template-columns:repeat(3,1fr) !important;}
body.mx #vc [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}

/* ── DIARY VIEW: content panel padding on mobile ── */
body.mx #diary-inner>div:nth-child(2){padding:20px 14px 80px !important;}

/* ── CSS fallback for no-JS narrow screens ── */
@media(max-width:768px){
  #mobile-topbar{display:flex;}
  #bottom-nav{display:flex;}
  #sidebar{transform:translateX(-100%);}
  #main{margin-left:0;padding-top:48px;padding-bottom:70px;}
}
</style>
</head>
<body>

<!-- Hidden forms for CORS-exempt cross-origin writes from file:// origins.
     Form POST to a named iframe bypasses the same-origin policy entirely.
     The iframe response is discarded — these are fire-and-forget writes. -->
<iframe id="gas-sink-db" name="gas-sink-db" style="display:none;"></iframe>
<form id="gas-form-db" method="POST" target="gas-sink-db" style="display:none;">
  <input type="hidden" name="sheet" value="DB">
  <input type="hidden" name="data" id="gf-db-data">
</form>
<iframe id="gas-sink-people" name="gas-sink-people" style="display:none;"></iframe>
<form id="gas-form-people" method="POST" target="gas-sink-people" style="display:none;">
  <input type="hidden" name="sheet" value="PEOPLE">
  <input type="hidden" name="data" id="gf-people-data">
</form>

<!-- SIDEBAR -->
<div id="sidebar">
  <div style="padding:18px 14px 10px;">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:3px;">
      <div style="width:30px;height:30px;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;color:#fff;">CX</span>
      </div>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.45rem;color:var(--accent);letter-spacing:0.07em;text-shadow:0 0 18px rgba(246,144,0,0.5);">CODEX</span>
    </div>
    <p style="font-size:0.58rem;color:var(--muted);letter-spacing:0.14em;padding-left:39px;">MEDIA ARCHIVAL v2</p>
  </div>
  <div style="padding:6px 0;flex:1;overflow-y:auto;">
    <p style="font-size:0.58rem;color:var(--muted);letter-spacing:0.12em;padding:5px 14px 4px;margin-top:2px;">NAVIGATE</p>
    <div class="nav-item active" data-view="nexus"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>NEXUS</div>
    <div class="nav-item" data-view="archive"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="1"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>ARCHIVE</div>
    <div class="nav-item" data-view="watchlist"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z"/></svg>WATCHLIST</div>
    <div class="nav-item" data-view="lab"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18"/></svg>LABORATORY</div>
    <div class="nav-item" data-view="settings"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4"/></svg>SETTINGS</div>
  </div>
  <div style="padding:12px 14px;border-top:1px solid var(--steel);">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">
      <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#60A5FA,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:800;color:#fff;flex-shrink:0;">O</div>
      <div><p style="font-size:0.7rem;font-weight:600;">Ollie</p><p id="os-stat" style="font-size:0.58rem;color:var(--muted);"></p></div>
    </div>
    <div style="display:flex;align-items:center;gap:7px;">
      <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#F472B6,#EC4899);display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:800;color:#fff;flex-shrink:0;">J</div>
      <div><p style="font-size:0.7rem;font-weight:600;">Jemima</p><p id="js-stat" style="font-size:0.58rem;color:var(--muted);"></p></div>
    </div>
    <div style="margin-top:9px;padding-top:9px;border-top:1px solid rgba(83,177,177,0.12);display:flex;align-items:center;gap:7px;cursor:pointer;" onclick="nav('settings')" title="Cloud sync status — click to open Settings">
      <div id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.4s,box-shadow 0.4s;"></div>
      <span id="sync-lbl" style="font-size:0.53rem;letter-spacing:0.1em;color:var(--muted);font-family:'JetBrains Mono',monospace;">NO CLOUD</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main"><div id="vc" style="padding:22px;"></div></div>

<!-- CINEMA VIEW -->
<div id="cinema-view"><div id="cinema-inner"></div></div>

<!-- DIRECTOR GALLERY VIEW -->
<div id="director-view"><div id="director-inner"></div></div>

/** Update the sidebar dot and label to reflect current sync state. */
function setSyncStatus(s){
  SYNC_STATUS=s;
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-lbl');
  if(!dot)return;
  const map={
    idle:    {color:'var(--muted)',   text:'NO CLOUD'},
    pending: {color:'#F6C624',        text:'PENDING…'},
    syncing: {color:'#53B1B1',        text:'SYNCING…'},
    synced:  {color:'#10B981',        text:'SYNCED'},
    error:   {color:'#EF4444',        text:'SYNC ERR'},
  };
  const m=map[s]||map.idle;
  dot.style.background=m.color;
  dot.style.boxShadow=s==='synced'?'0 0 6px #10B981':s==='error'?'0 0 6px #EF4444':s==='syncing'?'0 0 6px #53B1B1':'none';
  if(lbl)lbl.textContent=m.text;
}

/** Debounce: waits 1500ms after last saveDB/savePeople call before pushing to cloud. */
function _queueSync(){
  if(!CODEX_CONFIG.API_URL)return;
  setSyncStatus('pending');
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(syncToCloud,1500);
}

/** Client-side DB merge — same logic as GAS mergeDB.
 *  Merges `incoming` into the live DB array by id, with lastModified winning on conflict.
 *  Ignores empty/null payloads so a blank cloud can never wipe local data. */
function _mergeDBLocal(incoming){
  if(!incoming||!Array.isArray(incoming)||incoming.length===0)return false;
  const map={};
  DB.forEach(item=>{if(item&&item.id)map[item.id]=item;});
  incoming.forEach(item=>{
    if(!item||!item.id)return;
    if(!map[item.id]){map[item.id]=item;}
    else{
      const exTs=map[item.id].lastModified||0;
      const inTs=item.lastModified||(exTs+1);
      if(inTs>=exTs)map[item.id]=item;
    }
  });
  DB=Object.values(map);
  localStorage.setItem('codex2_db',JSON.stringify(DB));
  return true;
}

/** Client-side PEOPLE merge — shallow, cloud values overwrite local for matching keys.
 *  Ignores empty payloads. */
function _mergePeopleLocal(incoming){
  if(!incoming||typeof incoming!=='object'||Array.isArray(incoming))return false;
  if(Object.keys(incoming).length===0)return false;
  PEOPLE_DB=Object.assign({},PEOPLE_DB,incoming);
  localStorage.setItem('codex2_people',JSON.stringify(PEOPLE_DB));
  return true;
}

/**
 * JSONP read from Google Apps Script — the only fetch that works from file://.
 * Dynamic <script> tags are exempt from the same-origin policy.
 * GAS doGet wraps the response in callback({...}) when ?callback= is present.
 */
function _jsonpFetch(url){
  return new Promise((resolve,reject)=>{
    const cb='_gas_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const t=setTimeout(()=>{cleanup();reject(new Error('JSONP timeout'));},15000);
    function cleanup(){clearTimeout(t);delete window[cb];if(script.parentNode)script.remove();}
    window[cb]=data=>{cleanup();resolve(data);};
    script.onerror=()=>{cleanup();reject(new Error('JSONP load error'));};
    script.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.head.appendChild(script);
  });
}

/**
 * Push DB to Google Sheets via hidden form POST — exempt from same-origin policy.
 * Fire-and-forget: the response lands in the hidden iframe and is discarded.
 * Sends the full DB in one shot; GAS merges server-side.
 */
function _pushDB(){
  const form=document.getElementById('gas-form-db');
  if(!form||!CODEX_CONFIG.API_URL)return;
  form.action=CODEX_CONFIG.API_URL;
  document.getElementById('gf-db-data').value=JSON.stringify(DB);
  form.submit();
}

/** Push PEOPLE to Google Sheets via hidden form POST. Fire-and-forget. */
function _pushPeople(){
  const form=document.getElementById('gas-form-people');
  if(!form||!CODEX_CONFIG.API_URL)return;
  form.action=CODEX_CONFIG.API_URL;
  document.getElementById('gf-people-data').value=JSON.stringify(PEOPLE_DB);
  form.submit();
}

/** Push both stores to cloud and update sync indicator. Called by debounce queue.
 *  Pushes are fire-and-forget form submits — no await needed. */
function syncToCloud(){
  if(!CODEX_CONFIG.API_URL)return;
  setSyncStatus('syncing');
  try{
    _pushDB();
    _pushPeople();
    // Optimistically mark synced; the next poll will confirm
    setSyncStatus('synced');
  }catch(e){
    console.error('[CODEX] Cloud sync failed:',e);
    setSyncStatus('error');
  }
}

/** Poll cloud for remote changes via JSONP (works from file:// origins).
 *  Runs every 30s when API_URL is configured. Merges remote → local. */
async function pollCloud(){
  if(!CODEX_CONFIG.API_URL)return;
  try{
    const [j1,j2]=await Promise.all([
      _jsonpFetch(CODEX_CONFIG.API_URL+'?sheet=DB'),
      _jsonpFetch(CODEX_CONFIG.API_URL+'?sheet=PEOPLE'),
    ]);
    let changed=false;
    if(j1&&j1.data){
      const before=DB.length;
      if(_mergeDBLocal(j1.data)&&DB.length!==before)changed=true;
    }
    if(j2&&j2.data)_mergePeopleLocal(j2.data);
    setSyncStatus('synced');
    if(changed){
      if(VIEW==='nexus')rNexus();
      else if(VIEW==='archive')rArchive();
      else if(VIEW==='watchlist')rWatchlist();
      else if(VIEW==='lab')rLab();
    }
  }catch(e){
    setSyncStatus('error');
  }
}

/** One-click migration: push all local data up to the cloud, then poll to confirm. */
function migrateToCloud(){
  if(!CODEX_CONFIG.API_URL){alert('Save a Google Apps Script URL first.');return;}
  if(!confirm(`Push ${DB.length} entries and all People data to Google Sheets?\n\nThis will merge with any existing cloud data.`))return;
  setSyncStatus('syncing');
  _pushDB();
  _pushPeople();
  setSyncStatus('synced');
  toast(`↑ ${DB.length} entries sent — verifying in 5s…`,'☁');
  // Poll after a short delay to let GAS finish processing the form POST
  setTimeout(async()=>{
    try{
      await pollCloud();
      toast(`✓ Cloud confirmed ${DB.length} entries`);
    }catch(e){
      toast('Migration sent — could not verify yet','⚠');
    }
  },5000);
}

/** Save the Google Apps Script URL and activate sync. */
function saveGASUrl(){
  const url=(document.getElementById('gas-url-inp').value||'').trim();
  CODEX_CONFIG.API_URL=url;
  localStorage.setItem('codex_gas_url',url);
  if(url){
    setSyncStatus('idle');
    // Start poll interval if not already running
    if(!_pollTimer)_pollTimer=setInterval(pollCloud,30000);
    toast('Cloud URL saved — click MIGRATE to push your data');
  }else{
    clearInterval(_pollTimer);_pollTimer=null;
    setSyncStatus('idle');
    toast('Cloud URL cleared — running offline');
  }
  rSettings();
}

const flt=m=>{const d=Math.floor(m/1440),h=Math.floor((m%1440)/60);return d?`${d}d ${h}h`:`${h}h`;};

// ═══════════════════════════════ NEXUS HELPERS ═══════════════════════════════
function getOnThisDay(){
  const now=new Date();
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const dd=String(now.getDate()).padStart(2,'0');
  const todayMD=`${mm}-${dd}`;
  const thisYear=now.getFullYear();
  const seen=new Set();
  const results=[];
  DB.forEach(item=>{
    // Check watch log entries first
    (item.watchLog||[]).forEach(entry=>{
      if(!entry.date||seen.has(item.id))return;
      if(entry.date.slice(5)===todayMD){
        const yr=parseInt(entry.date.slice(0,4));
        if(yr<thisYear){seen.add(item.id);results.push({item,date:entry.date,yearsAgo:thisYear-yr});}
      }
    });
    // Fall back to dateAdded if no watchLog match
    if(!seen.has(item.id)&&item.dateAdded&&item.dateAdded.slice(5)===todayMD){
      const yr=parseInt(item.dateAdded.slice(0,4));
      if(yr<thisYear){seen.add(item.id);results.push({item,date:item.dateAdded,yearsAgo:thisYear-yr});}
    }
  });
  return results.sort((a,b)=>a.yearsAgo-b.yearsAgo).slice(0,6);
}
function getPendingRatings(){
  return DB.filter(item=>{
    if((item.ollieStatus==='Watchlist'||item.ollieStatus==='Unwatched')&&(item.jemimaStatus==='Watchlist'||item.jemimaStatus==='Unwatched'))return false;
    const oPending=item.ollieStatus==='Watched'&&!item.ollieRating;
    const jPending=item.jemimaStatus==='Watched'&&!item.jemimaRating;
    return oPending||jPending;
  }).slice(0,8);
}

function getFiltered(){
  const items=DB.filter(item=>{
    // Status filter
    if(FILTERS.statusF==='watched'){if(item.ollieStatus!=='Watched'||item.jemimaStatus!=='Watched')return false;}
    else if(FILTERS.statusF==='queue'){if(item.ollieStatus!=='Watchlist'&&item.jemimaStatus!=='Watchlist')return false;}
    else if(FILTERS.statusF==='unwatched'){if(item.ollieStatus!=='Unwatched'&&item.jemimaStatus!=='Unwatched')return false;}
    else{if(item.ollieStatus==='Watchlist'&&item.jemimaStatus==='Watchlist')return false;if(item.ollieStatus==='Unwatched'&&item.jemimaStatus==='Unwatched')return false;}
    if(item.type!==ATAB)return false;
    const s=SEARCH.toLowerCase();
    if(s&&!item.title.toLowerCase().includes(s)&&!(item.director||'').toLowerCase().includes(s)&&!(item.creator||'').toLowerCase().includes(s)&&!(item.cast||[]).some(c=>c.toLowerCase().includes(s)))return false;
    if(FILTERS.decade){const d=parseInt(FILTERS.decade);if(item.year<d||item.year>=d+10)return false;}
    if(FILTERS.genre&&!(item.genre||[]).includes(FILTERS.genre))return false;
    // Rating filter — uses whichever rating the user selected
    const rv=FILTERS.rateBy==='ollie'?item.ollieRating:FILTERS.rateBy==='jemima'?item.jemimaRating:avg(item);
    if(FILTERS.minR!==''&&rv!=null&&rv<parseFloat(FILTERS.minR))return false;
    if(FILTERS.maxR!==''&&rv!=null&&rv>parseFloat(FILTERS.maxR))return false;
    if(FILTERS.controversy&&dlt(item)<=2)return false;
    return true;
  });
  // Sort
  return items.sort((a,b)=>{
    if(SORT==='ollie')return(b.ollieRating||0)-(a.ollieRating||0);
    if(SORT==='jemima')return(b.jemimaRating||0)-(a.jemimaRating||0);
    if(SORT==='bay')return bay(b)-bay(a);
    if(SORT==='year_d')return(b.year||0)-(a.year||0);
    if(SORT==='year_a')return(a.year||0)-(b.year||0);
    if(SORT==='title')return(a.title||'').localeCompare(b.title||'');
    // Default: joint avg — unrated items sink to bottom
    const av=avg(a),bv=avg(b);
    if(av===null&&bv===null)return 0;
    if(av===null)return 1;
    if(bv===null)return -1;
    return bv-av;
  });
}

function getPeopleData(role){
  // Build a map of name → stats
  const map={};
  DB.forEach(item=>{
    const names=role==='Director'
      ?[(item.director||item.creator||'')].filter(Boolean)
      :(item.cast||[]);
    names.forEach(name=>{
      if(!name)return;
      if(!map[name])map[name]={name,works:[],asDirector:false,asCreator:false,asCast:false};
      map[name].works.push(item);
      if(role==='Director'){
        if(item.director===name)map[name].asDirector=true;
        if(item.creator===name)map[name].asCreator=true;
      } else {
        map[name].asCast=true;
        // Also check if this person is also a director in any entry
        if(DB.some(d=>(d.director||d.creator)===name))map[name].asDirector=true;
      }
    });
  });
  return Object.values(map).map(p=>{
    // Include solo-rated works: bay() returns solo rating for those, so the aggregate is correct
    const ratable=p.works.filter(w=>w.ollieRating||w.jemimaRating);
    const oItems=p.works.filter(w=>w.ollieRating);
    const jItems=p.works.filter(w=>w.jemimaRating);
    p.avgBay=ratable.length?(ratable.reduce((s,w)=>s+bay(w),0)/ratable.length):null;
    p.avgO=oItems.length?(oItems.reduce((s,w)=>s+w.ollieRating,0)/oItems.length):null;
    p.avgJ=jItems.length?(jItems.reduce((s,w)=>s+w.jemimaRating,0)/jItems.length):null;
    p.workCount=p.works.length;
    p.img=pImg(p.name)||null;
    // Role label
    if(role==='Director'){
      p.roleLabel=p.asCreator&&!p.asDirector?'CREATOR':p.asCreator?'DIRECTOR / CREATOR':'DIRECTOR';
    } else {
      p.roleLabel=p.asDirector?'ACTOR / DIRECTOR':'ACTOR';
    }
    return p;
  });
}

function rPeopleGrid(){
  const grid=document.getElementById('archive-grid');if(!grid)return;

function buildTI(user,minR){
  const items=DB.filter(d=>{
    if(d.ollieStatus!=='Watched'||d.jemimaStatus!=='Watched')return false;
    if(minR!==null&&minR!==''){
      const r=user==='ollie'?d.ollieRating:user==='jemima'?d.jemimaRating:avg(d);
      if(!r||r<parseFloat(minR))return false;
    }
    return true;
  });
  const mins=twMins(items),days=Math.floor(mins/1440),hrs=Math.floor((mins%1440)/60);
  const debtM=twMins(items.filter(d=>dlt(d)>2)),debtH=Math.floor(debtM/60);
  return`<div style="text-align:center;margin-bottom:12px;">
    <p style="font-family:'JetBrains Mono',monospace;font-size:1.9rem;font-weight:700;color:var(--accent);">${days}d ${hrs}h</p>
    <p style="font-size:0.68rem;color:var(--muted);">${items.length} matched entries</p>
  </div>
  <div style="background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r);padding:9px;text-align:center;">
    <p style="font-size:0.6rem;letter-spacing:0.08em;color:var(--danger);margin-bottom:1px;">TIME DEBT (Δ&gt;2.0)</p>
    <p style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--danger);">${debtH}h</p>
    <p style="font-size:0.62rem;color:var(--muted);">on contentious entries</p>
  </div>`;
}
function updateTI(){
  const u=document.getElementById('ti-user')?.value,m=document.getElementById('ti-min')?.value;
  const r=document.getElementById('ti-result');if(r)r.innerHTML=buildTI(u,m);
}

// ─── BLIND SPOTS ───
function getBlindSpots(genreFilter){
  const seen=new Set(DB.map(i=>normTitle(i.title)));
  let films=CANONICAL.filter(f=>!seen.has(normTitle(f.t)));
  if(genreFilter)films=films.filter(f=>f.g.includes(genreFilter));
  return films;
}

}

// ─── RATING DRIFT ───
function rDriftChart(){
  const ctx=document.getElementById('drift-chart');if(!ctx)return;
  const months={o:{},j:{}};
  DB.forEach(item=>{
    // Use watchLog entries first
    const log=item.watchLog||[];
    log.forEach(e=>{
      if(!e.date)return;
      const key=e.date.slice(0,7);
      if(e.ollieRating){months.o[key]=months.o[key]||[];months.o[key].push(e.ollieRating);}
      if(e.jemimaRating){months.j[key]=months.j[key]||[];months.j[key].push(e.jemimaRating);}
    });
    // Fallback for items with no watchLog entries (edge case)
    if(!log.length&&item.dateAdded){
      const key=item.dateAdded.slice(0,7);
      if(item.ollieRating){months.o[key]=months.o[key]||[];months.o[key].push(item.ollieRating);}
      if(item.jemimaRating){months.j[key]=months.j[key]||[];months.j[key].push(item.jemimaRating);}
    }
  });
  const keys=[...new Set([...Object.keys(months.o),...Object.keys(months.j)])].sort();
  if(keys.length<2){
    ctx.parentElement.innerHTML='<p style="color:var(--muted);font-size:0.78rem;text-align:center;padding:28px;">Not enough dated entries yet to plot drift.</p>';
    return;
  }
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const labels=keys.map(k=>`${mn[parseInt(k.slice(5))-1]} '${k.slice(2,4)}`);
  const avgArr=(key,map)=>{const a=map[key];return a&&a.length?(a.reduce((s,v)=>s+v,0)/a.length):null;};
  chartInst.drift=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Ollie',data:keys.map(k=>avgArr(k,months.o)),borderColor:'rgba(96,165,250,0.9)',backgroundColor:'rgba(96,165,250,0.07)',fill:true,tension:0.38,pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'rgba(96,165,250,0.9)',spanGaps:true,borderWidth:2},
        {label:'Jemima',data:keys.map(k=>avgArr(k,months.j)),borderColor:'rgba(244,114,182,0.9)',backgroundColor:'rgba(244,114,182,0.07)',fill:true,tension:0.38,pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'rgba(244,114,182,0.9)',spanGaps:true,borderWidth:2}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#A8C4CC',font:{family:'Barlow',size:11}}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y!==null?c.parsed.y.toFixed(2):'—'}`}}
      },
      scales:{
        x:{grid:{color:'rgba(83,177,177,0.1)'},ticks:{color:'#A8C4CC',font:{size:9},maxTicksLimit:14,maxRotation:40}},
        y:{min:0,max:10,grid:{color:'rgba(83,177,177,0.1)'},ticks:{color:'#A8C4CC',font:{size:10},stepSize:2}}
      }
    }
  });
}

// ─── QUARTERLY HEATMAP ───
function rHeatmap(){
  const wrap=document.getElementById('heatmap-wrap');if(!wrap)return;
  const qdata={};
  DB.forEach(item=>{
    const dates=[];
    (item.watchLog||[]).forEach(e=>{if(e.date)dates.push(e.date);});
    if(!dates.length&&item.dateAdded)dates.push(item.dateAdded);
    dates.forEach(dateStr=>{
      const yr=parseInt(dateStr.slice(0,4));
      const mo=parseInt(dateStr.slice(5,7));
      if(!yr||!mo||isNaN(yr)||isNaN(mo)||yr<2000||yr>2100)return;
      const q='Q'+Math.ceil(mo/3);
      if(!qdata[yr])qdata[yr]={Q1:0,Q2:0,Q3:0,Q4:0};
      qdata[yr][q]++;
    });
  });
  const years=Object.keys(qdata).map(Number).sort((a,b)=>b-a);
  if(!years.length){wrap.innerHTML='<p style="color:var(--muted);font-size:0.78rem;">No dated entries found.</p>';return;}
  const maxVal=Math.max(...years.flatMap(y=>Object.values(qdata[y])),1);
  const cellStyle=count=>{
    if(!count)return'background:rgba(255,255,255,0.03);';
    const t=Math.min(count/maxVal,1);
    return`background:rgba(246,144,0,${(0.14+t*0.72).toFixed(2)});`;
  };
  const qlabels=['Jan – Mar','Apr – Jun','Jul – Sep','Oct – Dec'];
  wrap.innerHTML=`
    <div style="overflow-x:auto;">
      <table style="border-collapse:separate;border-spacing:4px;min-width:400px;">
        <thead><tr>
          <th style="font-size:0.58rem;color:var(--muted);text-align:left;padding:4px 12px;font-weight:700;letter-spacing:0.08em;min-width:52px;"></th>
          ${['Q1','Q2','Q3','Q4'].map((q,i)=>`<th style="font-size:0.58rem;color:var(--muted);text-align:center;padding:4px 6px;font-weight:700;letter-spacing:0.08em;"><div>${q}</div><div style="font-weight:400;font-size:0.5rem;opacity:0.7;">${qlabels[i]}</div></th>`).join('')}
        </tr></thead>
        <tbody>
          ${years.map(yr=>`<tr>
            <td style="font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);padding:4px 12px;white-space:nowrap;">${yr}</td>
            ${['Q1','Q2','Q3','Q4'].map(q=>{
              const n=qdata[yr][q]||0;
              return`<td style="${cellStyle(n)}border-radius:3px;text-align:center;padding:12px 8px;min-width:72px;border:1px solid rgba(255,255,255,0.04);transition:opacity 0.2s;" title="${n} entries">
                <span style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;color:${n?'var(--text)':'rgba(255,255,255,0.15)'};">${n||'·'}</span>
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <p style="font-size:0.58rem;color:var(--muted);margin-top:8px;opacity:0.7;">Total entries logged per quarter. Orange intensity = relative volume. Uses diary dates where available, otherwise date added.</p>`;
}

// ─── TASTE COMPATIBILITY ───
const _alignCol=a=>a>=85?'var(--success)':a>=70?'var(--accent)':a>=55?'#F6C624':'var(--danger)';

function buildCompatibility(){
  const mutual=DB.filter(d=>d.ollieRating&&d.jemimaRating);
  if(mutual.length<3)return null;
  // Overall: mean absolute deviation, normalised to 0-100%
  const mad=mutual.reduce((s,d)=>s+Math.abs(d.ollieRating-d.jemimaRating),0)/mutual.length;
  const overall=Math.round((1-mad/9)*100);
  // Genre alignment
  const genres={};
  mutual.forEach(item=>(item.genre||[]).forEach(g=>{
    if(!genres[g])genres[g]={diffs:[],count:0};
    genres[g].diffs.push(Math.abs(item.ollieRating-item.jemimaRating));
    genres[g].count++;
  }));
  const genreScores=Object.entries(genres)
    .filter(([,v])=>v.count>=2)
    .map(([g,v])=>({genre:g,count:v.count,alignment:Math.round((1-(v.diffs.reduce((a,b)=>a+b,0)/v.diffs.length/9))*100)}))
    .sort((a,b)=>b.alignment-a.alignment);
  // Director alignment
  const dirs={};
  mutual.forEach(item=>{
    const d=item.director||item.creator;if(!d)return;
    if(!dirs[d])dirs[d]={diffs:[],count:0};
    dirs[d].diffs.push(Math.abs(item.ollieRating-item.jemimaRating));
    dirs[d].count++;
  });
  const dirScores=Object.entries(dirs)
    .filter(([,v])=>v.count>=2)
    .map(([d,v])=>({director:d,count:v.count,alignment:Math.round((1-(v.diffs.reduce((a,b)=>a+b,0)/v.diffs.length/9))*100)}))
    .sort((a,b)=>b.alignment-a.alignment)
    .slice(0,6);
  return{overall,mutual:mutual.length,genreScores:genreScores.slice(0,9),dirScores};
}

function importDB(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!Array.isArray(data))throw new Error();if(!confirm(`Import ${data.length} entries?`))return;DB=data;saveDB();toast(`${data.length} entries imported`);nav('nexus');}catch{alert('Invalid backup file.');}};r.readAsText(file);}

function toggleEfR(){
  const os=document.getElementById('ef-os')?.value,js=document.getElementById('ef-js')?.value;if(!os||!js)return;
  const noRatings=(os==='Watchlist'||os==='Unwatched')&&(js==='Watchlist'||js==='Unwatched');
  const rf=document.getElementById('ef-ratings'),pf=document.getElementById('ef-pri-f');
  if(rf)rf.style.display=noRatings?'none':'';if(pf)pf.style.display=noRatings?'':'none';

function saveEntry(id){
  const title=document.getElementById('ef-title').value.trim();if(!title){alert('Title required.');return;}
  const type=document.getElementById('ef-type').value,dirVal=document.getElementById('ef-dir').value.trim();
  const os=document.getElementById('ef-os').value,js=document.getElementById('ef-js').value;
  const bwl=(os==='Watchlist'||os==='Unwatched')&&(js==='Watchlist'||js==='Unwatched');
  let cImgs={};try{const v=document.getElementById('ef-cimgs').value.trim();if(v)cImgs=JSON.parse(v);}catch(e){}
  const entry={
    id:id||gid(),type,title,year:parseInt(document.getElementById('ef-year').value)||null,
    genre:document.getElementById('ef-genre').value.split(',').map(g=>g.trim()).filter(Boolean),
    director:type!=='Show'?(dirVal||null):null,creator:type==='Show'?(dirVal||null):null,
    cast:document.getElementById('ef-cast').value.split(',').map(c=>c.trim()).filter(Boolean),
    castImageUrls:cImgs,runtime:parseInt(document.getElementById('ef-runtime').value)||null,
    episodes:parseInt(document.getElementById('ef-eps').value)||null,
    mediaImageUrl:document.getElementById('ef-img').value.trim()||null,
    directorImageUrl:document.getElementById('ef-dimg').value.trim()||null,
    ollieStatus:os,jemimaStatus:js,
    ollieRating:!bwl?(parseFloat(document.getElementById('ef-or')?.value)||null):null,
    jemimaRating:!bwl?(parseFloat(document.getElementById('ef-jr')?.value)||null):null,
    ollieReview:!bwl?(document.getElementById('ef-orev')?.value||null):null,
    jemimaReview:!bwl?(document.getElementById('ef-jrev')?.value||null):null,
    imdbId:null,imdbRating:parseFloat(document.getElementById('ef-imdb').value)||null,
    dateAdded:id?(DB.find(d=>d.id===id)?.dateAdded||new Date().toISOString().split('T')[0]):new Date().toISOString().split('T')[0],
    priority:bwl?(parseInt(document.getElementById('ef-pri')?.value)||3):null
  };
  if(id){const idx=DB.findIndex(d=>d.id===id);if(idx!==-1)DB[idx]=entry;}else DB.push(entry);
  // Sync any image URLs entered here into PEOPLE_DB so they propagate across all films
  const pName=entry.director||entry.creator;
  if(pName&&entry.directorImageUrl){PEOPLE_DB[pName]=PEOPLE_DB[pName]||{};PEOPLE_DB[pName].imageUrl=entry.directorImageUrl;}
  Object.entries(entry.castImageUrls||{}).forEach(([n,u])=>{if(u){PEOPLE_DB[n]=PEOPLE_DB[n]||{};PEOPLE_DB[n].imageUrl=u;}});
  savePeople();
  saveDB();closeModal();toast(`"${title}" ${id?'updated':'added'}`);nav(VIEW);
}
function deleteItem(id){
  const item=DB.find(d=>d.id===id);if(!item)return;
  if(!confirm(`Delete "${item.title}"?`))return;
  DB=DB.filter(d=>d.id!==id);saveDB();toast(`"${item.title}" deleted`,'🗑');nav(VIEW);
}

// ─── YEAR IN REVIEW ───
function getYearData(days){
  const cutoff=new Date();
  cutoff.setDate(cutoff.getDate()-days);
  const cutStr=cutoff.toISOString().split('T')[0];
  const watched=[];
  DB.forEach(item=>{
    (item.watchLog||[]).forEach(e=>{
      if(e.date>=cutStr)watched.push({...e,item});
    });
  });
  watched.sort((a,b)=>a.date.localeCompare(b.date));
  const total=watched.length;
  const rated=watched.filter(e=>e.ollieRating&&e.jemimaRating);
  const avgO=watched.filter(e=>e.ollieRating).reduce((s,e,_,a)=>s+e.ollieRating/a.length,0)||0;
  const avgJ=watched.filter(e=>e.jemimaRating).reduce((s,e,_,a)=>s+e.jemimaRating/a.length,0)||0;
  // Genre breakdown
  const gMap={};watched.forEach(e=>{const g=e.item.genre||'Other';gMap[g]=(gMap[g]||0)+1;});
  const topGenres=Object.entries(gMap).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([g,c])=>({genre:g,count:c}));
  // Top rated (both rated, sorted by avg)
  const topRated=[...DB].filter(i=>i.ollieRating&&i.jemimaRating).sort((a,b)=>avg(b)-avg(a));
  const topItem=topRated[0]||null;
  // Most contested
  const contested=[...DB].filter(i=>i.ollieRating&&i.jemimaRating).sort((a,b)=>dlt(b)-dlt(a));
  const contestedItem=contested[0]||null;
  // Total hours
  const totalMins=watched.reduce((s,e)=>{const i=e.item;return s+(i.type==='Show'?(i.runtime||0)*(i.episodes||1):(i.runtime||0));},0);
  return{total,avgO,avgJ,topGenres,topItem,contestedItem,totalMins,days};
}

function downloadWrappedCard(days){
  const data=getYearData(days||365);
  const W=800,H=1050;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  // Background
  const bgGrad=ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0,'#11222C');bgGrad.addColorStop(0.5,'#1C5858');bgGrad.addColorStop(1,'#11222C');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
  // Accent stripe
  const stripe=ctx.createLinearGradient(0,0,W,0);
  stripe.addColorStop(0,'#B86A00');stripe.addColorStop(0.5,'#F69000');stripe.addColorStop(1,'#D47A00');
  ctx.fillStyle=stripe;ctx.fillRect(0,0,W,6);
  // Glow
  const glow=ctx.createRadialGradient(W*0.85,H*0.12,10,W*0.85,H*0.12,260);
  glow.addColorStop(0,'rgba(246,144,0,0.18)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
  // CODEX label
  ctx.font='bold 13px "Courier New",monospace';ctx.fillStyle='#F69000';ctx.letterSpacing='4px';
  ctx.fillText('CODEX · '+new Date().getFullYear(),56,54);
  // Title
  ctx.font='900 96px Impact,Arial Black,sans-serif';ctx.fillStyle='#F8FAFC';
  const label=days===365?'YEAR IN':days===180?'LAST 6':'LAST 30';
  const label2=days===365?'REVIEW':days===180?'MONTHS':'DAYS';
  ctx.fillText(label,54,130);ctx.fillText(label2,54,220);
  // Accent underline
  ctx.fillStyle='#F69000';ctx.fillRect(54,234,160,4);
  // Stats grid (3 boxes)
  const boxes=[
    {label:'TITLES WATCHED',val:String(data.total),x:54},
    {label:'HOURS SPENT',val:String(Math.floor(data.totalMins/60)),x:310},
    {label:'OLLIE AVG',val:data.avgO?data.avgO.toFixed(1):'—',x:566},
  ];
  boxes.forEach(b=>{
    ctx.fillStyle='rgba(0,0,0,0.3)';roundRect(ctx,b.x,270,220,130,3);ctx.fill();
    ctx.strokeStyle='rgba(246,144,0,0.25)';ctx.lineWidth=1;roundRect(ctx,b.x,270,220,130,3);ctx.stroke();
    ctx.font='bold 10px "Courier New",monospace';ctx.fillStyle='#7AACB8';ctx.letterSpacing='2px';
    ctx.fillText(b.label,b.x+16,300);
    ctx.font='900 64px "Barlow Condensed",Impact,sans-serif';ctx.fillStyle='#F69000';ctx.letterSpacing='0px';
    ctx.fillText(b.val,b.x+16,370);
  });
  // Jemima avg below ollie
  if(data.avgJ){ctx.font='bold 10px "Courier New",monospace';ctx.fillStyle='#F9A8D4';ctx.letterSpacing='2px';ctx.fillText('JEM: '+data.avgJ.toFixed(1),582,410);}
  // Genre bars
  ctx.font='bold 11px "Courier New",monospace';ctx.fillStyle='#7AACB8';ctx.letterSpacing='3px';
  ctx.fillText('TOP GENRES',54,450);
  ctx.letterSpacing='0px';
  const maxG=data.topGenres[0]?.count||1;
  data.topGenres.forEach((g,i)=>{
    const y=476+i*64;const bw=Math.round(530*(g.count/maxG));
    const alpha=0.35+i*0.15;
    ctx.fillStyle=`rgba(246,144,0,${alpha})`;ctx.fillRect(54,y,bw,36);
    ctx.font='700 20px "Courier New",sans-serif';ctx.fillStyle='#F8FAFC';
    ctx.fillText(g.genre+' ·'+g.count+'×',66,y+24);
  });
  // Highlights
  const hY=640;
  ctx.fillStyle='rgba(0,0,0,0.25)';roundRect(ctx,54,hY,340,140,3);ctx.fill();
  ctx.strokeStyle='rgba(246,144,0,0.2)';ctx.lineWidth=1;roundRect(ctx,54,hY,340,140,3);ctx.stroke();
  ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle='#F69000';ctx.letterSpacing='2px';ctx.fillText('⭐ CROWD PLEASER',70,hY+24);
  ctx.letterSpacing='0px';ctx.font='700 19px "Barlow Condensed",Impact,sans-serif';ctx.fillStyle='#F8FAFC';
  wrapText(ctx,data.topItem?data.topItem.title:'—',70,hY+58,310,26);
  ctx.fillStyle='rgba(0,0,0,0.25)';roundRect(ctx,418,hY,340,140,3);ctx.fill();
  ctx.strokeStyle='rgba(239,68,68,0.2)';ctx.lineWidth=1;roundRect(ctx,418,hY,340,140,3);ctx.stroke();
  ctx.font='bold 9px "Courier New",monospace';ctx.fillStyle='#EF4444';ctx.letterSpacing='2px';ctx.fillText('🔥 MOST CONTESTED',434,hY+24);
  ctx.letterSpacing='0px';ctx.font='700 19px "Barlow Condensed",Impact,sans-serif';ctx.fillStyle='#F8FAFC';
  wrapText(ctx,data.contestedItem?data.contestedItem.title:'—',434,hY+58,310,26);
  if(data.contestedItem){ctx.font='12px "Courier New",monospace';ctx.fillStyle='#7AACB8';ctx.fillText('Δ'+dlt(data.contestedItem).toFixed(1)+' split',434,hY+110);}
  // Footer
  ctx.fillStyle='rgba(246,144,0,0.3)';ctx.fillRect(54,H-80,W-108,1);

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function wrapText(ctx,text,x,y,maxW,lineH){const words=text.split(' ');let line='';words.forEach((w,i)=>{const test=line+w+' ';if(ctx.measureText(test).width>maxW&&i>0){ctx.fillText(line,x,y);line=w+' ';y+=lineH;}else line=test;});ctx.fillText(line,x,y);}

function saveWatchEntry(id){

function deleteWatchEntry(id,idx){
  const item=DB.find(d=>d.id===id);if(!item||!item.watchLog)return;
  if(!confirm('Remove this watch entry?'))return;
  item.watchLog.splice(idx,1);

  const latestO=[...item.watchLog].reverse().find(e=>e.ollieRating);

async function fetchDirectorFilmography(name){
  const key=getTMDbKey();
  if(!key)return null;
  const p=PEOPLE_DB[name]||{};
  const TTL=86400000; // 24h
  if(p.filmography&&p.filmographyFetched&&(Date.now()-p.filmographyFetched)<TTL)return p.filmography;
  try{
    const sr=await fetch(`https://api.themoviedb.org/3/search/person?api_key=${key}&query=${encodeURIComponent(name)}`);
    const sd=await sr.json();
    if(!sd.results?.length)return null;
    const pid=sd.results[0].id;
    const cr=await fetch(`https://api.themoviedb.org/3/person/${pid}/movie_credits?api_key=${key}`);
    const cd=await cr.json();
    // Keep directing credits only, filter out shorts/low-vote noise
    const films=(cd.crew||[]).filter(f=>f.job==='Director'&&f.vote_count>50&&f.release_date)
      .sort((a,b)=>b.release_date.localeCompare(a.release_date))
      .map(f=>({id:f.id,title:f.title,year:parseInt(f.release_date),poster:f.poster_path?`https://image.tmdb.org/t/p/w185${f.poster_path}`:null}));
    if(!PEOPLE_DB[name])PEOPLE_DB[name]={};
    PEOPLE_DB[name].filmography=films;
    PEOPLE_DB[name].filmographyFetched=Date.now();
    savePeople();
    return films;
  }catch(e){console.error('Filmography fetch failed',e);return null;}
}

function exportCSV(){
  const headers=['id','type','title','year','genre','director','creator','cast','runtime','episodes','mediaImageUrl','directorImageUrl','ollieStatus','ollieRating','ollieReview','jemimaStatus','jemimaRating','jemimaReview','imdbId','imdbRating','dateAdded','priority'];
  const ce=v=>{if(v===null||v===undefined)return'';const s=String(v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;};
  const rows=[headers.join(','),...DB.map(i=>[i.id,i.type,i.title,i.year,(i.genre||[]).join('|'),i.director,i.creator,(i.cast||[]).join('|'),i.runtime,i.episodes,i.mediaImageUrl,i.directorImageUrl,i.ollieStatus,i.ollieRating,i.ollieReview,i.jemimaStatus,i.jemimaRating,i.jemimaReview,i.imdbId,i.imdbRating,i.dateAdded,i.priority].map(ce).join(','))];
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='codex_export.csv';a.click();URL.revokeObjectURL(url);
  toast('CSV exported');
}
function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      const headers=lines[0].split(',').map(h=>h.trim());
      const parseRow=line=>{
        const fields=[];let cur='',inQ=false;
        for(let i=0;i<line.length;i++){
          if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
          else if(line[i]===','&&!inQ){fields.push(cur);cur='';}
          else cur+=line[i];
        }
        fields.push(cur);
        const obj={};headers.forEach((h,i)=>obj[h]=fields[i]?.trim()||null);
        return{
          id:obj.id||gid(),type:obj.type||'Film',title:obj.title||'',year:parseInt(obj.year)||null,
          genre:obj.genre?obj.genre.split('|').filter(Boolean):[],
          director:obj.director||null,creator:obj.creator||null,
          cast:obj.cast?obj.cast.split('|').filter(Boolean):[],castImageUrls:{},
          runtime:parseInt(obj.runtime)||null,episodes:parseInt(obj.episodes)||null,
          mediaImageUrl:obj.mediaImageUrl||null,directorImageUrl:obj.directorImageUrl||null,
          ollieStatus:obj.ollieStatus||'Watchlist',ollieRating:parseFloat(obj.ollieRating)||null,ollieReview:obj.ollieReview||null,
          jemimaStatus:obj.jemimaStatus||'Watchlist',jemimaRating:parseFloat(obj.jemimaRating)||null,jemimaReview:obj.jemimaReview||null,
          imdbId:obj.imdbId||null,imdbRating:parseFloat(obj.imdbRating)||null,
          dateAdded:obj.dateAdded||new Date().toISOString().split('T')[0],priority:parseInt(obj.priority)||null
        };
      };
      const rows=lines.slice(1).map(parseRow);
      if(!confirm(`Merge ${rows.length} CSV entries into CODEX? Matching IDs will be updated.`))return;
      rows.forEach(row=>{const idx=DB.findIndex(d=>d.id===row.id);if(idx!==-1)DB[idx]={...DB[idx],...row};else DB.push(row);});
      saveDB();migratePeople();toast(`${rows.length} entries merged from CSV`);nav('nexus');
    }catch(err){alert('CSV parse error: '+err.message);}
  };r.readAsText(file);
}

<script>
(function(){
  /* ── State ── */
  function getMobileForce(){return localStorage.getItem('codex_mob')==='1';}

  function applyMobileMode(){
    const force=getMobileForce();

    document.body.classList.toggle('mx',force||auto);
    syncBnavActive();
    // Update topbar view label
    const lbl=document.getElementById('mob-view-label');

  function syncBnavActive(){
    document.querySelectorAll('#bottom-nav .bnav-item[data-view]').forEach(b=>{
      b.classList.toggle('active',b.dataset.view===VIEW);
    });
  }

  /* Toggle from Settings — exposed globally */
  window.setMobileForce=function(on){
    localStorage.setItem('codex_mob',on?'1':'0');
    applyMobileMode();
    toast(on?'Mobile layout enabled':'Desktop layout restored');
  };

  /* Wrap nav() to also sync bottom nav after every navigation */
  const _origNav=window.nav;
  window.nav=function(view){
    _origNav(view);
    syncBnavActive();
    const lbl=document.getElementById('mob-view-label');
    if(lbl)lbl.textContent=VIEW||'';
  };

  /* Bottom nav click handlers */
  document.getElementById('bottom-nav').addEventListener('click',function(e){

    if(!btn)return;
    closeCinema();closeDirectorView();closeActorView();closeDiaryView();closeWrappedView();
    nav(btn.dataset.view);
  });

  /* Viewport resize listener */
  window.addEventListener('resize',applyMobileMode,{passive:true});
